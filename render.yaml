services:
  - type: web
    name: syphoon-tracking-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: syphoon-db
          property: connectionString

databases:
  - name: syphoon-db
    plan: free
